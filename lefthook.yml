pre-commit:
  parallel: false
  commands:
    lint-fix:
      glob: "*.{ts,mjs,astro,css}"
      run: pnpm lint:fix -- {staged_files}
      stage_fixed: true
    format-fix:
      glob: "*.{ts,mjs,astro,css}"
      run: pnpm format:fix -- {staged_files}
      stage_fixed: true
    actionlint:
      glob: ".github/workflows/*.{yml,yaml}"
      run: actionlint {staged_files}
